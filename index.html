<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 관리</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>업무 관리</h1>
      <p class="subtitle">할 일을 추가하고 상태를 관리하세요</p>
    </header>

    <form id="add-form">
      <input type="text" id="task-input" placeholder="새 업무를 입력하세요" maxlength="200" required>
      <button type="submit">추가</button>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="todo">대기</button>
      <button class="filter-btn" data-filter="doing">진행중</button>
      <button class="filter-btn" data-filter="done">완료</button>
    </div>

    <ul id="task-list"></ul>

    <p id="empty-message" class="hidden">등록된 업무가 없습니다.</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
